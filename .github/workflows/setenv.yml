name: Set Vercel Env Vars

on:
  workflow_dispatch:

jobs:
  setenv:
    runs-on: ubuntu-latest
    steps:
      - name: Set all env vars on Vercel project
        run: |
          VT="${{ secrets.VERCEL_TOKEN }}"
          PID="prj_X8Wum9saUBQ7LQlDTnnH32yYNpHz"
          
          # Delete all existing env vars first
          ENVS=$(curl -s -H "Authorization: Bearer $VT" "https://api.vercel.com/v9/projects/$PID/env")
          echo "$ENVS" | node -e "
            let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{
              const envs=JSON.parse(d).envs||[];
              envs.forEach(e=>console.log(e.id));
            });
          " > /tmp/env_ids.txt
          echo "Existing env IDs:"
          cat /tmp/env_ids.txt
          
          while read id; do
            if [ -n "$id" ]; then
              curl -s -X DELETE -H "Authorization: Bearer $VT" \
                "https://api.vercel.com/v9/projects/$PID/env/$id" > /dev/null
              echo "Deleted: $id"
            fi
          done < /tmp/env_ids.txt
          
          # Add correct env vars
          add_env() {
            local key=$1
            local value=$2
            curl -s -X POST \
              -H "Authorization: Bearer $VT" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"$key\",\"value\":\"$value\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}" \
              "https://api.vercel.com/v9/projects/$PID/env" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const r=JSON.parse(d);console.log('Added',r.key||r.error?.message)})"
          }
          
          add_env "NEXT_PUBLIC_SUPABASE_URL" "https://xavkbjbgmuasfkliptsh.supabase.co"
          add_env "NEXT_PUBLIC_SUPABASE_ANON_KEY" "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdmtiamdtdWFzZmtsaXB0c2giLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NjgxNTU5MiwiZXhwIjoyMDYyMzkxNTkyfQ.LMkYBBaSHNFUOm3ETy1N1PL60vVCj7kpORCBJ6mGf1M"
          add_env "GROQ_API_KEY" "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"
          
          echo "All env vars set"
