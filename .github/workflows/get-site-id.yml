name: Save Netlify Site ID

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  save_id:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - name: Get site ID by name
        run: |
          RESPONSE=$(curl -s -H "Authorization: Bearer $NETLIFY_TOKEN" "https://api.netlify.com/api/v1/sites?filter=all")
          SITE_ID=$(echo "$RESPONSE" | python3 -c "
import sys,json
try:
    sites = json.load(sys.stdin)
    for s in sites:
        if 'vector-intelligence-prod' in s.get('name',''):
            print(s['id'])
            break
except: pass
" 2>/dev/null)
          echo "Found Site ID: $SITE_ID"
          echo "$SITE_ID" > SITE_INFO.txt
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add SITE_INFO.txt
          git diff --staged --quiet || (git commit -m "chore: save site ID [skip ci]" && git push origin main)
        env:
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
