name: Check Deployments

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: List all deployments
        run: |
          VT="${{ secrets.VERCEL_TOKEN }}"
          
          # List all projects
          curl -s -H "Authorization: Bearer $VT" "https://api.vercel.com/v9/projects?limit=20" > /tmp/projs.json
          echo "=== PROJECTS ==="
          node -e "
            const d=require('/tmp/projs.json');
            (d.projects||[]).forEach(p=>console.log(p.id, p.name));
          "
          
          PROJ_ID=$(node -e "const d=require('/tmp/projs.json');const p=d.projects?.find(x=>x.name==='vector-intelligence');process.stdout.write(p?.id||'NONE')")
          echo "Project ID: $PROJ_ID"
          
          if [ "$PROJ_ID" != "NONE" ]; then
            echo "=== DEPLOYMENTS ==="
            curl -s -H "Authorization: Bearer $VT" "https://api.vercel.com/v6/deployments?projectId=$PROJ_ID&limit=10" > /tmp/deps.json
            node -e "
              const d=require('/tmp/deps.json');
              (d.deployments||[]).forEach(dep=>console.log(dep.state, dep.url, new Date(dep.created).toISOString()));
            "
          fi
