name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://xavkbjbgmuasfkliptsh.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdmtiamdtdWFzZmtsaXB0c2giLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NjgxNTU5MiwiZXhwIjoyMDYyMzkxNTkyfQ.LMkYBBaSHNFUOm3ETy1N1PL60vVCj7kpORCBJ6mGf1M
      GROQ_API_KEY: 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

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Get or create project
        run: |
          VT="${{ secrets.VERCEL_TOKEN }}"
          curl -s -H "Authorization: Bearer $VT" "https://api.vercel.com/v9/projects?limit=20" > /tmp/projs.json
          PROJ_ID=$(node -e "const d=require('/tmp/projs.json');const p=d.projects?.find(x=>x.name==='vector-intelligence');process.stdout.write(p?.id||'')")
          if [ -z "$PROJ_ID" ]; then
            curl -s -X POST -H "Authorization: Bearer $VT" -H "Content-Type: application/json" \
              -d '{"name":"vector-intelligence","framework":"nextjs"}' \
              "https://api.vercel.com/v9/projects" > /tmp/np.json
            PROJ_ID=$(node -e "const d=require('/tmp/np.json');process.stdout.write(d.id||'')")
          fi
          echo "PROJ_ID=$PROJ_ID" >> $GITHUB_ENV
          curl -s -H "Authorization: Bearer $VT" "https://api.vercel.com/v2/user" > /tmp/user.json
          ORG_ID=$(node -e "const d=require('/tmp/user.json');process.stdout.write(d.user?.id||'')")
          echo "ORG_ID=$ORG_ID" >> $GITHUB_ENV
          echo "Project: $PROJ_ID | Org: $ORG_ID"

      - name: npm build
        run: npm run build

      - name: Deploy to Vercel
        continue-on-error: true
        run: |
          VT="${{ secrets.VERCEL_TOKEN }}"
          rm -rf .vercel && mkdir -p .vercel
          echo "{\"projectId\":\"$PROJ_ID\",\"orgId\":\"$ORG_ID\"}" > .vercel/project.json
          echo "project.json: $(cat .vercel/project.json)"
          OUTPUT=$(vercel deploy --prebuilt --prod --token="$VT" 2>&1)
          echo "$OUTPUT" > /tmp/vercel_out.txt
          echo "=== OUTPUT ==="
          cat /tmp/vercel_out.txt
          URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' | grep -v inspect | tail -1)
          echo "URL: $URL"
          echo "$URL" > VERCEL_LIVE_URL.txt

      - name: Save results
        run: |
          cp /tmp/vercel_out.txt VERCEL_OUTPUT.txt 2>/dev/null || echo "no output" > VERCEL_OUTPUT.txt
          git config user.email ci@v.com && git config user.name CI
          git add VERCEL_LIVE_URL.txt VERCEL_OUTPUT.txt
          git diff --staged --quiet || (git commit -m "debug: vercel output [skip ci]" && git push origin main) || true
          echo "=== Saved ==="
          cat VERCEL_LIVE_URL.txt
          cat VERCEL_OUTPUT.txt | head -30
