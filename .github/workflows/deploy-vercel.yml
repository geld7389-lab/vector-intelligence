name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://xavkbjbgmuasfkliptsh.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdmtiamdtdWFzZmtsaXB0c2giLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NjgxNTU5MiwiZXhwIjoyMDYyMzkxNTkyfQ.LMkYBBaSHNFUOm3ETy1N1PL60vVCj7kpORCBJ6mGf1M
      GROQ_API_KEY: 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

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Setup project.json
        run: |
          VT="${{ secrets.VERCEL_TOKEN }}"
          USER_ID=$(curl -s -H "Authorization: Bearer $VT" "https://api.vercel.com/v2/user" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>process.stdout.write(JSON.parse(d).user?.id||''))")
          rm -rf .vercel && mkdir -p .vercel
          echo "{\"projectId\":\"prj_X8Wum9saUBQ7LQlDTnnH32yYNpHz\",\"orgId\":\"$USER_ID\"}" > .vercel/project.json
          echo "project.json: $(cat .vercel/project.json)"

      - name: Vercel build
        continue-on-error: true
        run: |
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee /tmp/build_out.txt
          echo "Exit: $?"
          echo "=== OUTPUT ==="
          cat /tmp/build_out.txt

      - name: Save build output
        run: |
          cp /tmp/build_out.txt VERCEL_BUILD_OUT.txt 2>/dev/null || echo "no output" > VERCEL_BUILD_OUT.txt
          ls .vercel/ 2>/dev/null && echo "Has .vercel/" || echo "No .vercel/"
          ls .vercel/output/ 2>/dev/null && echo "Has .vercel/output/" || echo "No .vercel/output/"
          git config user.email ci@v.com && git config user.name CI
          git add VERCEL_BUILD_OUT.txt
          git diff --staged --quiet || (git commit -m "debug: build output [skip ci]" && git push origin main) || true
          cat VERCEL_BUILD_OUT.txt
