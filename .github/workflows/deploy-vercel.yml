name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://xavkbjbgmuasfkliptsh.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdmtiamdtdWFzZmtsaXB0c2giLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NjgxNTU5MiwiZXhwIjoyMDYyMzkxNTkyfQ.LMkYBBaSHNFUOm3ETy1N1PL60vVCj7kpORCBJ6mGf1M
      GROQ_API_KEY: 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

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Setup Vercel project
        run: |
          VT="${{ secrets.VERCEL_TOKEN }}"
          
          # Get user/team info
          echo "Checking account..."
          curl -s -H "Authorization: Bearer $VT" "https://api.vercel.com/v2/user" > /tmp/user.json
          node -e "
            const d=require('/tmp/user.json');
            console.log('User:', d.user?.username, d.user?.id);
          "
          
          # List projects to find existing one
          curl -s -H "Authorization: Bearer $VT" "https://api.vercel.com/v9/projects?limit=20" > /tmp/projs.json
          PROJ_ID=$(node -e "
            const d=require('/tmp/projs.json');
            const p=d.projects?.find(x=>x.name==='vector-intelligence');
            process.stdout.write(p?.id||'');
          ")
          
          if [ -z "$PROJ_ID" ]; then
            echo "Creating project..."
            curl -s -X POST \
              -H "Authorization: Bearer $VT" \
              -H "Content-Type: application/json" \
              -d '{"name":"vector-intelligence","framework":"nextjs"}' \
              "https://api.vercel.com/v9/projects" > /tmp/new_proj.json
            cat /tmp/new_proj.json | head -c 200
            PROJ_ID=$(node -e "const d=require('/tmp/new_proj.json');process.stdout.write(d.id||'')")
          fi
          
          echo "Project ID: $PROJ_ID"
          ORG_ID=$(node -e "
            const d=require('/tmp/user.json');
            process.stdout.write(d.user?.id||'');
          ")
          echo "Org ID: $ORG_ID"
          
          rm -rf .vercel
          mkdir -p .vercel
          node -e "
            const fs=require('fs');
            fs.writeFileSync('.vercel/project.json', JSON.stringify({projectId:'$PROJ_ID',orgId:'$ORG_ID'}));
            console.log('Written:', fs.readFileSync('.vercel/project.json','utf8'));
          "

      - name: Vercel build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Vercel deploy
        run: |
          VT="${{ secrets.VERCEL_TOKEN }}"
          OUTPUT=$(vercel deploy --prebuilt --prod --token="$VT" 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' | grep -v inspect | tail -1)
          echo "LIVE: $URL"
          echo "$URL" > VERCEL_LIVE_URL.txt
          git config user.email ci@v.com && git config user.name CI
          git add VERCEL_LIVE_URL.txt
          git diff --staged --quiet || (git commit -m "live: $URL [skip ci]" && git push origin main) || true
