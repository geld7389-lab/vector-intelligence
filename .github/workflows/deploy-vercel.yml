name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://xavkbjbgmuasfkliptsh.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdmtiamdtdWFzZmtsaXB0c2giLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NjgxNTU5MiwiZXhwIjoyMDYyMzkxNTkyfQ.LMkYBBaSHNFUOm3ETy1N1PL60vVCj7kpORCBJ6mGf1M
      GROQ_API_KEY: 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

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Check Vercel token and find/create project
        run: |
          echo "=== Checking Vercel token ==="
          USER=$(curl -s -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" https://api.vercel.com/v2/user)
          echo "Response: $(echo $USER | head -c 200)"
          
          USERNAME=$(echo $USER | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('user',{}).get('username','NO_USER'))" 2>/dev/null || echo "PARSE_ERROR")
          echo "Username: $USERNAME"
          
          echo "=== Listing projects ==="
          PROJECTS=$(curl -s -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" https://api.vercel.com/v9/projects?limit=10)
          echo "Projects: $(echo $PROJECTS | python3 -c "import json,sys; d=json.load(sys.stdin); [print(p.get('id'),p.get('name')) for p in d.get('projects',[])]" 2>/dev/null || echo $PROJECTS | head -c 300)"

      - name: Build
        run: npm run build

      - name: Deploy
        run: |
          OUTPUT=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oE 'https://[^[:space:]]+' | grep -v 'inspect' | tail -1)
          echo "DEPLOY_URL=$URL" >> $GITHUB_ENV
          echo "Deployed to: $URL"

      - name: Save URL to repo
        run: |
          echo "$DEPLOY_URL" > VERCEL_URL.txt
          git config user.email "ci@vector.com"
          git config user.name "CI"
          git add VERCEL_URL.txt
          git diff --staged --quiet || (git commit -m "deploy: $DEPLOY_URL [skip ci]" && git push origin main)
