name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://xavkbjbgmuasfkliptsh.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdmtiamdtdWFzZmtsaXB0c2giLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NjgxNTU5MiwiZXhwIjoyMDYyMzkxNTkyfQ.LMkYBBaSHNFUOm3ETy1N1PL60vVCj7kpORCBJ6mGf1M
      GROQ_API_KEY: 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

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Setup project.json
        run: |
          VT="${{ secrets.VERCEL_TOKEN }}"
          
          # Get user ID (orgId for personal accounts)
          USER_ID=$(curl -s -H "Authorization: Bearer $VT" "https://api.vercel.com/v2/user" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>process.stdout.write(JSON.parse(d).user?.id||''))")
          echo "User ID: $USER_ID"
          
          # Project ID from what we found
          PROJ_ID="prj_X8Wum9saUBQ7LQlDTnnH32yYNpHz"
          
          rm -rf .vercel && mkdir -p .vercel
          echo "{\"projectId\":\"$PROJ_ID\",\"orgId\":\"$USER_ID\"}" > .vercel/project.json
          echo "project.json: $(cat .vercel/project.json)"

      - name: Build
        run: npm run build

      - name: Deploy
        run: |
          VT="${{ secrets.VERCEL_TOKEN }}"
          vercel deploy --prebuilt --prod --token="$VT" 2>&1 | tee /tmp/out.txt
          echo "Exit: $?"
          cat /tmp/out.txt
          URL=$(grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' /tmp/out.txt | grep -v inspect | tail -1)
          echo "URL: [$URL]"
          
          if [ -z "$URL" ]; then
            # Try getting from Vercel API
            curl -s -H "Authorization: Bearer $VT" "https://api.vercel.com/v6/deployments?projectId=prj_X8Wum9saUBQ7LQlDTnnH32yYNpHz&limit=3" > /tmp/d.json
            URL=$(node -e "const d=require('/tmp/d.json');const dep=d.deployments?.[0];process.stdout.write(dep?'https://'+dep.url:'')")
            echo "API URL: [$URL]"
          fi
          
          echo "$URL" > VERCEL_LIVE_URL.txt
          git config user.email ci@v.com && git config user.name CI
          git add VERCEL_LIVE_URL.txt
          git diff --staged --quiet || (git commit -m "live: $URL [skip ci]" && git push origin main) || true
