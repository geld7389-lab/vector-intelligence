name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://xavkbjbgmuasfkliptsh.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdmtiamdtdWFzZmtsaXB0c2giLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NjgxNTU5MiwiZXhwIjoyMDYyMzkxNTkyfQ.LMkYBBaSHNFUOm3ETy1N1PL60vVCj7kpORCBJ6mGf1M
      GROQ_API_KEY: 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

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Clear old Vercel project config
        run: |
          rm -rf .vercel
          echo "Cleared .vercel"

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        run: |
          set +e
          OUTPUT=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          EXIT=$?
          echo "=== FULL OUTPUT ==="
          echo "$OUTPUT"
          echo "=== EXIT: $EXIT ==="
          
          URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9._-]+' | grep 'vercel' | grep -v 'inspect' | tail -1)
          echo "URL: $URL"
          
          echo "$OUTPUT" > /tmp/vercel_output.txt
          echo "$URL" > VERCEL_URL.txt
          
          git config user.email "ci@vector.com"
          git config user.name "CI"
          git add VERCEL_URL.txt
          git diff --staged --quiet || (git commit -m "deploy: Vercel URL [skip ci]" && git push origin main)
          
          [ $EXIT -eq 0 ]
