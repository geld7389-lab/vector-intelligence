name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://xavkbjbgmuasfkliptsh.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdmtiamdtdWFzZmtsaXB0c2giLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NjgxNTU5MiwiZXhwIjoyMDYyMzkxNTkyfQ.LMkYBBaSHNFUOm3ETy1N1PL60vVCj7kpORCBJ6mGf1M
      GROQ_API_KEY: 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

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Set Vercel env
        run: |
          VT="${{ secrets.VERCEL_TOKEN }}"
          USER_ID=$(curl -s -H "Authorization: Bearer $VT" https://api.vercel.com/v2/user | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>process.stdout.write(JSON.parse(d).user?.id||''))")
          echo "VERCEL_ORG_ID=$USER_ID" >> $GITHUB_ENV
          echo "VERCEL_PROJECT_ID=prj_X8Wum9saUBQ7LQlDTnnH32yYNpHz" >> $GITHUB_ENV

      - name: Pull Vercel settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Vercel build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: |
          VT="${{ secrets.VERCEL_TOKEN }}"
          set +e
          OUTPUT=$(vercel deploy --prebuilt --prod --token="$VT" 2>&1)
          EXIT=$?
          echo "=== DEPLOY OUTPUT (exit $EXIT) ==="
          echo "$OUTPUT"
          echo "==================================="
          URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' | grep -v inspect | tail -1)
          echo "URL: [$URL]"
          echo "$OUTPUT" > VERCEL_DEPLOY_OUT.txt
          echo "$URL" > VERCEL_LIVE_URL.txt
          git config user.email ci@v.com && git config user.name CI
          git add VERCEL_DEPLOY_OUT.txt VERCEL_LIVE_URL.txt
          git diff --staged --quiet || (git commit -m "debug: deploy output [skip ci]" && git push origin main) || true
          exit $EXIT
