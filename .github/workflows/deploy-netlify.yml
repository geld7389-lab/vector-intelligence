name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: https://xavkbjbgmuasfkliptsh.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdmtiamdtdWFzZmtsaXB0c2giLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NjgxNTU5MiwiZXhwIjoyMDYyMzkxNTkyfQ.LMkYBBaSHNFUOm3ETy1N1PL60vVCj7kpORCBJ6mGf1M
      GROQ_API_KEY: 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

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@17

      - name: Get site ID
        id: site
        run: |
          SITES=$(curl -s -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" "https://api.netlify.com/api/v1/sites?filter=all&per_page=100")
          echo "$SITES" > /tmp/sites.json
          SITE_ID=$(python3 -c "
import json
with open('/tmp/sites.json') as f:
    sites = json.load(f)
for s in sites:
    if s.get('name') == 'vector-intelligence-prod':
        print(s['id'])
        break
")
          if [ -z "$SITE_ID" ]; then
            echo "Creating site..."
            RESP=$(curl -s -X POST -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" -H "Content-Type: application/json" -d '{"name":"vector-intelligence-prod"}' "https://api.netlify.com/api/v1/sites")
            SITE_ID=$(python3 -c "import json; print(json.loads('$RESP').get('id',''))" 2>/dev/null || echo "")
          fi
          echo "id=$SITE_ID" >> $GITHUB_OUTPUT
          echo "Site ID: [$SITE_ID]"

      - name: Build
        run: npm run build

      - name: Deploy
        run: |
          SITE_ID="${{ steps.site.outputs.id }}"
          echo "Deploying to: $SITE_ID"
          netlify deploy --prod --build --site="$SITE_ID" 2>&1 | tee /tmp/out.txt
          cat /tmp/out.txt
          URL=$(grep -oE 'https://[a-zA-Z0-9_.-]+\.netlify\.app' /tmp/out.txt | head -1)
          echo "Live URL: $URL"
          echo "$URL" > NETLIFY_LIVE_URL.txt
          git config user.email "ci@vector.com"
          git config user.name "CI"
          git add NETLIFY_LIVE_URL.txt
          git diff --staged --quiet || (git commit -m "deploy: $URL [skip ci]" && git push origin main)
