name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://xavkbjbgmuasfkliptsh.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdmtiamdtdWFzZmtsaXB0c2giLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NjgxNTU5MiwiZXBwIjoyMDYyMzkxNTkyfQ.LMkYBBaSHNFUOm3ETy1N1PL60vVCj7kpORCBJ6mGf1M
          GROQ_API_KEY: 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

      - name: Install Netlify CLI
        run: npm i -g netlify-cli

      - name: Deploy and capture URL
        id: netlify
        run: |
          OUTPUT=$(netlify deploy --prod --dir=.next --json 2>&1)
          echo "Raw output: $OUTPUT"
          DEPLOY_URL=$(echo "$OUTPUT" | python3 -c "import sys,json; lines=sys.stdin.read(); data=json.loads(lines); print(data.get('deploy_url', data.get('url','')))" 2>/dev/null || echo "")
          SITE_ID=$(echo "$OUTPUT" | python3 -c "import sys,json; lines=sys.stdin.read(); data=json.loads(lines); print(data.get('site_id',''))" 2>/dev/null || echo "")
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "SITE_ID=$SITE_ID" >> $GITHUB_OUTPUT
          echo "Deploy URL: $DEPLOY_URL"
          echo "Site ID: $SITE_ID"
          # Write URL to a file we can read
          echo "$DEPLOY_URL" > /tmp/deploy_url.txt
          echo "$SITE_ID" > /tmp/site_id.txt
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Save URL to repo
        run: |
          DEPLOY_URL="${{ steps.netlify.outputs.DEPLOY_URL }}"
          SITE_ID="${{ steps.netlify.outputs.SITE_ID }}"
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          echo "NETLIFY_URL=$DEPLOY_URL" > DEPLOY_INFO.txt
          echo "SITE_ID=$SITE_ID" >> DEPLOY_INFO.txt
          echo "DEPLOYED_AT=$(date)" >> DEPLOY_INFO.txt
          git add DEPLOY_INFO.txt
          git commit -m "deploy: save netlify URL [skip ci]" || echo "No changes"
          git push || echo "Push failed"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
