name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://xavkbjbgmuasfkliptsh.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdmtiamdtdWFzZmtsaXB0c2giLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NjgxNTU5MiwiZXBwIjoyMDYyMzkxNTkyfQ.LMkYBBaSHNFUOm3ETy1N1PL60vVCj7kpORCBJ6mGf1M
          GROQ_API_KEY: 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

      - name: Install Netlify CLI
        run: npm i -g netlify-cli

      - name: Create site and get ID
        id: create_site
        run: |
          SITE_ID="${{ secrets.NETLIFY_SITE_ID }}"
          if [ -z "$SITE_ID" ]; then
            echo "No site ID found, creating new site..."
            SITE_JSON=$(netlify sites:create --name vector-intelligence-prod --json 2>&1 || netlify sites:create --json 2>&1)
            echo "Create output: $SITE_JSON"
            SITE_ID=$(echo "$SITE_JSON" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
            echo "New site ID: $SITE_ID"
          else
            echo "Using existing site ID: $SITE_ID"
          fi
          echo "SITE_ID=$SITE_ID" >> $GITHUB_OUTPUT
          # Deploy to this site
          RESULT=$(netlify deploy --prod --dir=.next --site="$SITE_ID" 2>&1)
          echo "$RESULT"
          URL=$(echo "$RESULT" | grep -oP 'https://[a-z0-9-]+\.netlify\.app' | head -1)
          echo "DEPLOY_URL=$URL" >> $GITHUB_OUTPUT
          echo "Site URL: $URL"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Save deploy info
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          echo "NETLIFY_URL=${{ steps.create_site.outputs.DEPLOY_URL }}" > DEPLOY_INFO.txt
          echo "SITE_ID=${{ steps.create_site.outputs.SITE_ID }}" >> DEPLOY_INFO.txt
          echo "DEPLOYED_AT=$(date -u)" >> DEPLOY_INFO.txt
          git add DEPLOY_INFO.txt
          git diff --staged --quiet || git commit -m "deploy: update netlify info [skip ci]"
          git push origin main || true
