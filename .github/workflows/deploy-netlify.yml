name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: https://xavkbjbgmuasfkliptsh.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdmtiamdtdWFzZmtsaXB0c2giLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NjgxNTU5MiwiZXhwIjoyMDYyMzkxNTkyfQ.LMkYBBaSHNFUOm3ETy1N1PL60vVCj7kpORCBJ6mGf1M
      GROQ_API_KEY: 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

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@17

      - name: Get site ID
        id: site
        run: |
          curl -s -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" "https://api.netlify.com/api/v1/sites?filter=all&per_page=100" > /tmp/sites.json
          node -e "
            const s=require('/tmp/sites.json');
            const found=s.find(x=>x.name==='vector-intelligence-prod');
            console.log(found?found.id:'');
          " > /tmp/site_id.txt
          SITE_ID=$(cat /tmp/site_id.txt)
          if [ -z "$SITE_ID" ]; then
            echo "Creating site..."
            curl -s -X POST -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" -H "Content-Type: application/json" \
              -d '{"name":"vector-intelligence-prod"}' \
              "https://api.netlify.com/api/v1/sites" > /tmp/new_site.json
            node -e "const d=require('/tmp/new_site.json');console.log(d.id||'')" > /tmp/site_id.txt
            SITE_ID=$(cat /tmp/site_id.txt)
          fi
          echo "id=$SITE_ID" >> $GITHUB_OUTPUT
          echo "Site: $SITE_ID"

      - name: Build and deploy
        run: |
          SITE_ID="${{ steps.site.outputs.id }}"
          netlify deploy --prod --build --site="$SITE_ID" 2>&1 | tee /tmp/out.txt
          cat /tmp/out.txt
          URL=$(grep -oE 'https://[a-zA-Z0-9_.-]+\.netlify\.app' /tmp/out.txt | head -1)
          echo "URL: $URL"
          echo "$URL" > NETLIFY_LIVE_URL.txt
          git config user.email ci@v.com && git config user.name CI
          git add NETLIFY_LIVE_URL.txt
          git diff --staged --quiet || (git commit -m "url [skip ci]" && git push origin main) || true
