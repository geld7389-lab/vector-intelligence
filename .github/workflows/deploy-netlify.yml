name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: https://xavkbjbgmuasfkliptsh.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdmtiamdtdWFzZmtsaXB0c2giLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NjgxNTU5MiwiZXhwIjoyMDYyMzkxNTkyfQ.LMkYBBaSHNFUOm3ETy1N1PL60vVCj7kpORCBJ6mGf1M
      GROQ_API_KEY: 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

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@17

      - name: Get site ID
        run: |
          SITES=$(curl -s -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" "https://api.netlify.com/api/v1/sites?filter=all&per_page=100")
          SITE_ID=$(echo "$SITES" | jq -r '.[] | select(.name == "vector-intelligence-prod") | .id' | head -1)
          if [ -z "$SITE_ID" ]; then
            SITE_ID=$(curl -s -X POST -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" -H "Content-Type: application/json" -d '{"name":"vector-intelligence-prod"}' "https://api.netlify.com/api/v1/sites" | jq -r '.id')
          fi
          echo "NETLIFY_SITE_ID=$SITE_ID" >> $GITHUB_ENV
          mkdir -p .netlify
          echo "{\"siteId\":\"$SITE_ID\"}" > .netlify/state.json
          echo "Site ID: $SITE_ID"

      - name: Build
        run: npm run build

      - name: Debug and Deploy
        run: |
          echo "=== .netlify contents ==="
          ls -la .netlify/ || echo "no .netlify"
          echo "=== .next contents ==="
          ls .next/ | head -10
          echo "=== Deploying ==="
          netlify deploy --prod 2>&1 | tee /tmp/deploy_output.txt
          EXIT=$?
          cat /tmp/deploy_output.txt
          echo "Exit code: $EXIT"
          
          if [ $EXIT -ne 0 ]; then
            git config user.email "ci@vector.com"
            git config user.name "CI"
            cp /tmp/deploy_output.txt DEPLOY_ERROR.txt
            git add DEPLOY_ERROR.txt
            git diff --staged --quiet || git commit -m "ci: deploy error log [skip ci]" && git push origin main
          fi
        continue-on-error: true

      - name: Check result
        run: |
          if grep -q "Website URL" /tmp/deploy_output.txt 2>/dev/null; then
            echo "DEPLOY SUCCESS"
            grep "Website URL" /tmp/deploy_output.txt
          else
            echo "DEPLOY FAILED - see DEPLOY_ERROR.txt in repo"
            exit 1
          fi
