name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://xavkbjbgmuasfkliptsh.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhhdmtiamdtdWFzZmtsaXB0c2giLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NjgxNTU5MiwiZXBwIjoyMDYyMzkxNTkyfQ.LMkYBBaSHNFUOm3ETy1N1PL60vVCj7kpORCBJ6mGf1M
          GROQ_API_KEY: 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

      - name: Install Netlify CLI
        run: npm i -g netlify-cli

      - name: Get or create site ID
        id: site
        run: |
          # List all sites and get first one
          SITES=$(netlify api listSites 2>&1)
          echo "Sites: $SITES" | head -5
          SITE_ID=$(echo "$SITES" | python3 -c "
import sys, json
try:
    data = json.load(sys.stdin)
    if isinstance(data, list) and data:
        print(data[0]['id'])
    else:
        print('')
except:
    print('')
" 2>/dev/null || echo "")
          
          if [ -z "$SITE_ID" ]; then
            echo "Creating new site..."
            CREATE=$(netlify sites:create --name vector-intelligence-prod-$(date +%s) 2>&1)
            echo "Create: $CREATE"
            SITE_ID=$(echo "$CREATE" | grep -oP '"id": "[^"]*"' | head -1 | grep -oP '"[^"]*"$' | tr -d '"')
          fi
          
          echo "Site ID: $SITE_ID"
          echo "SITE_ID=$SITE_ID" >> $GITHUB_OUTPUT
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Deploy to Netlify
        id: deploy
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: '.next'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ steps.site.outputs.SITE_ID }}

      - name: Save deploy info
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          echo "NETLIFY_SITE_ID=${{ steps.site.outputs.SITE_ID }}" > DEPLOY_INFO.txt
          echo "DEPLOY_URL=${{ steps.deploy.outputs.deploy-url }}" >> DEPLOY_INFO.txt
          echo "DEPLOYED_AT=$(date -u)" >> DEPLOY_INFO.txt
          git add DEPLOY_INFO.txt
          git diff --staged --quiet || (git commit -m "deploy: netlify site info [skip ci]" && git push origin main)
